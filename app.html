<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro ERP - Sistema de Gestión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="alerts" class="alert-container"></div>

    <div class="app-layout hidden" id="appLayout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Micro ERP</div>
                <div class="sidebar-subtitle">Sistema de Gestión</div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-footer">
                <div class="user-mini">
                    <span id="userRoleBadge" class="badge badge-primary">Admin</span>
                    <strong id="userNameDisplay">Usuario</strong>
                </div>
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%; margin-top: 0.5rem;">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h2 id="topbarTitle">Dashboard</h2>
                <div class="topbar-actions">
                    <button class="btn btn-secondary btn-sm" onclick="app.refreshCurrentView()">↻ Actualizar</button>
                </div>
            </header>
            <div class="content-area" id="contentArea"></div>
        </main>
    </div>

    <!-- TEMPLATES -->
    <template id="tpl-dashboard">
        <div class="page" id="view-dashboard">
            <div class="page-header">
                <h1 class="page-title">Panel de Control</h1>
            </div>
            <div class="stats-grid" id="dashboardStats"></div>
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <div class="card-header"><h3>Ventas Recientes</h3></div>
                    <table class="table"><thead><tr><th>#</th><th>Total</th><th>Fecha</th></tr></thead><tbody id="recentSalesTable"></tbody></table>
                </div>
                <div class="dashboard-card">
                    <div class="card-header"><h3>Sesiones Activas</h3></div>
                    <table class="table"><thead><tr><th>PC</th><th>Cliente</th><th>Tiempo</th></tr></thead><tbody id="activeSessionsTable"></tbody></table>
                </div>
            </div>
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <div class="card-header"><h3>Stock Bajo</h3></div>
                    <table class="table"><thead><tr><th>Producto</th><th>Stock</th></tr></thead><tbody id="lowStockTable"></tbody></table>
                </div>
                <div class="dashboard-card">
                    <div class="card-header"><h3>Pedidos Pendientes</h3></div>
                    <table class="table"><thead><tr><th>#</th><th>Estado</th><th>Fecha</th></tr></thead><tbody id="pendingOrdersTable"></tbody></table>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-inventory">
        <div class="page" id="view-inventory">
            <div class="page-header">
                <h1 class="page-title">Gestión de Inventario</h1>
                <div class="header-actions">
                    <button class="btn btn-warning" onclick="app.showSellModal()">💰 Venta</button>
                    <button class="btn btn-primary" onclick="app.showAddProductModal()">+ Producto</button>
                </div>
            </div>
            <div class="filters-bar">
                <select id="invCategoryFilter" class="form-control" onchange="Inventory.filter()">
                    <option value="">Todas las categorías</option>
                </select>
                <select id="invStockFilter" class="form-control" onchange="Inventory.filter()">
                    <option value="">Todos</option>
                    <option value="low">Stock bajo</option>
                    <option value="out">Agotado</option>
                </select>
                <input type="text" id="invSearch" class="form-control" placeholder="Buscar..." oninput="Inventory.search()">
            </div>
            <div class="table-container">
                <table class="table"><thead><tr><th>SKU</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead><tbody id="inventoryTable"></tbody></table>
            </div>
        </div>
    </template>

    <template id="tpl-providers">
        <div class="page" id="view-providers">
            <div class="page-header">
                <h1 class="page-title">Proveedores</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="Providers.showOrderModal()">+ Nueva Orden</button>
                </div>
            </div>
            
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab active" data-tab="orders" onclick="Providers.switchTab('orders')">Pedidos</button>
                    <button class="tab" data-tab="directory" onclick="Providers.switchTab('directory')">Directorio</button>
                    <button class="tab" data-tab="lowstock" onclick="Providers.switchTab('lowstock')">Stock Bajo</button>
                </div>
                
                <div class="tab-content active" id="tab-orders">
                    <div class="filters-bar">
                        <select id="orderStatusFilter" class="form-control" onchange="Providers.loadOrders()">
                            <option value="">Todos</option>
                            <option value="draft">Borrador</option>
                            <option value="pending">Pendiente</option>
                            <option value="confirmed">Confirmado</option>
                            <option value="in_transit">En Camino</option>
                            <option value="completed">Completado</option>
                            <option value="cancelled">Cancelado</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table class="table"><thead><tr><th>#Orden</th><th>Proveedor</th><th>Fecha</th><th>Total</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="ordersTable"></tbody></table>
                    </div>
                </div>
                
                <div class="tab-content" id="tab-directory">
                    <div class="page-header" style="margin-bottom: 1rem;">
                        <div></div>
                        <button class="btn btn-primary" onclick="Providers.showSupplierModal()">+ Agregar Proveedor</button>
                    </div>
                    <div class="suppliers-grid" id="suppliersGrid"></div>
                </div>
                
                <div class="tab-content" id="tab-lowstock">
                    <div id="lowStockSection">
                        <div class="table-container">
                            <table class="table"><thead><tr><th>SKU</th><th>Producto</th><th>Stock</th><th>Mín.</th></tr></thead><tbody id="lowStockTable2"></tbody></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-cyber">
        <div class="page" id="view-cyber">
            <div class="page-header">
                <h1 class="page-title">Cibercontrol</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="Cyber.showSessionModal()">🎮 Nueva Sesión</button>
                </div>
            </div>
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab active" data-tab="stations" onclick="Cyber.switchTab('stations')">Estaciones</button>
                    <button class="tab" data-tab="sessions" onclick="Cyber.switchTab('sessions')">Sesiones Activas</button>
                    <button class="tab" data-tab="services" onclick="Cyber.switchTab('services')">Servicios</button>
                </div>
                <div class="tab-content active" id="tab-stations">
                    <div class="stations-grid" id="stationsGrid"></div>
                </div>
                <div class="tab-content" id="tab-sessions">
                    <div class="table-container"><table class="table"><thead><tr><th>PC</th><th>Cliente</th><th>Tiempo</th><th>Acciones</th></tr></thead><tbody id="activeSessionsTable2"></tbody></table></div>
                </div>
                <div class="tab-content" id="tab-services">
                    <div class="services-grid" id="servicesGrid"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-reports">
        <div class="page" id="view-reports">
            <div class="page-header">
                <h1 class="page-title">Reportes</h1>
            </div>
            <div class="filters-bar">
                <input type="date" id="repDateFrom" class="form-control">
                <input type="date" id="repDateTo" class="form-control">
                <button class="btn btn-primary" onclick="Reports.loadReport()">Generar</button>
            </div>
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab active" data-tab="sales" onclick="Reports.switchTab('sales')">Ventas</button>
                    <button class="tab" data-tab="cyber" onclick="Reports.switchTab('cyber')">Cibercafé</button>
                    <button class="tab" data-tab="inventory" onclick="Reports.switchTab('inventory')">Inventario</button>
                </div>
                <div class="tab-content active" id="tab-sales">
                    <div class="stats-grid" id="salesStats"></div>
                    <div class="table-container"><table class="table"><thead><tr><th>Fecha</th><th>Transacciones</th><th>Total</th></tr></thead><tbody id="salesReportTable"></tbody></table></div>
                </div>
                <div class="tab-content" id="tab-cyber">
                    <div class="stats-grid" id="cyberStats"></div>
                    <div class="table-container"><table class="table"><thead><tr><th>Fecha</th><th>Sesiones</th><th>Total</th></tr></thead><tbody id="cyberReportTable"></tbody></table></div>
                </div>
                <div class="tab-content" id="tab-inventory">
                    <div class="stats-grid" id="invStats"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-equipment">
        <div class="page" id="view-equipment">
            <div class="page-header">
                <h1 class="page-title">Equipamiento</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="Equipment.showAddModal()">+ Equipo</button>
                    <button class="btn btn-warning" onclick="Equipment.showLoanModal()">📋 Préstamo</button>
                </div>
            </div>
            <div class="table-container mb-3">
                <div class="card-header"><h3>Préstamos Activos</h3></div>
                <table class="table"><thead><tr><th>Equipo</th><th>Cliente</th><th>Inicio</th><th>Acciones</th></tr></thead><tbody id="activeLoansTable"></tbody></table>
            </div>
            <div class="table-container">
                <div class="card-header"><h3>Inventario</h3></div>
                <table class="table"><thead><tr><th>#</th><th>Nombre</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="equipmentTable"></tbody></table>
            </div>
        </div>
    </template>

    <div id="modalContainer" class="modal-overlay"></div>

    <script src="js/app.js"></script>
    <script src="js/equipment.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/provider.js"></script>
    <script src="js/cyber.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
