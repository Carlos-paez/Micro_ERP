<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro ERP - Sistema de Gestión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <div style="font-size: 3rem; margin-bottom: 0.5rem;">📊</div>
                <h1 class="auth-title">Micro ERP</h1>
                <p class="text-muted mt-1" id="authSubtitle">Sistema de Gestión Integral</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Usuario</label>
                    <input type="text" id="username" class="form-control" required autocomplete="username" placeholder="Ingresa tu usuario">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password" placeholder="Ingresa tu contraseña">
                </div>
                <div id="loginError" class="text-danger mb-2 hidden text-center" style="font-size: 0.875rem;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
                    <span id="loginBtnText">Ingresar</span>
                </button>
                <div class="text-center mt-3">
                    <a href="#" id="showRegister" class="text-muted" style="font-size: 0.875rem;">¿No tienes cuenta? Regístrate</a>
                </div>
            </form>

            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label class="form-label" for="regName">Nombre Completo</label>
                    <input type="text" id="regName" class="form-control" autocomplete="off" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regUsername">Usuario *</label>
                    <input type="text" id="regUsername" class="form-control" required autocomplete="off" placeholder="Nombre de usuario único">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regPassword">Contraseña *</label>
                    <input type="password" id="regPassword" class="form-control" required autocomplete="new-password" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regRole">Rol en el Sistema</label>
                    <select id="regRole" class="form-control">
                        <option value="operator">Operador</option>
                        <option value="admin">Administrador</option>
                        <option value="provider">Proveedor</option>
                    </select>
                    <small class="text-muted" style="font-size: 0.75rem; display: block; margin-top: 0.25rem;">
                        Operador: cibercafé, ventas | Admin: control total
                    </small>
                </div>
                <div id="registerError" class="text-danger mb-2 hidden text-center" style="font-size: 0.875rem;"></div>
                <button type="submit" class="btn btn-success" style="width: 100%; padding: 0.75rem;">Crear Cuenta</button>
                <div class="text-center mt-3">
                    <a href="#" id="showLogin" class="text-muted" style="font-size: 0.875rem;">Ya tengo cuenta, iniciar sesión</a>
                </div>
            </form>
            
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color); text-align: center;">
                <p class="text-muted" style="font-size: 0.75rem;">Credenciales de prueba:</p>
                <p class="text-muted" style="font-size: 0.75rem;">admin / password | operador1 / password</p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const btnText = document.getElementById('loginBtnText');
            
            errorDiv.classList.add('hidden');
            btnText.textContent = 'Verificando...';
            
            try {
                const res = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = 'app.html';
                } else {
                    errorDiv.textContent = data.error || 'Autenticación fallida';
                    errorDiv.classList.remove('hidden');
                    btnText.textContent = 'Ingresar';
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión con el servidor';
                errorDiv.classList.remove('hidden');
                btnText.textContent = 'Ingresar';
            }
        });

        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('authSubtitle').textContent = "Crea una nueva cuenta";
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('authSubtitle').textContent = "Sistema de Gestión Integral";
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const full_name = document.getElementById('regName').value;
            const role = document.getElementById('regRole').value;
            const errorDiv = document.getElementById('registerError');
            
            if (password.length < 6) {
                errorDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            errorDiv.classList.add('hidden');
            
            try {
                const res = await fetch('api/auth.php?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, full_name, role })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    alert('Cuenta creada con éxito. Ahora puedes iniciar sesión.');
                    document.getElementById('showLogin').click();
                } else {
                    errorDiv.textContent = data.error || 'Creación fallida';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.classList.remove('hidden');
            }
        });

        fetch('api/auth.php?action=session')
            .then(res => res.json())
            .then(data => {
                if (data.authenticated) window.location.href = 'app.html';
            });
    </script>
</body>
</html>
