<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Login - Enter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <h1 class="auth-title">ERP Solutions</h1>
                <p class="text-muted mt-1" id="authSubtitle">Inicie sesión para acceder a su panel</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Usuario</label>
                    <input type="text" id="username" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password">
                </div>
                <div id="loginError" class="text-danger mb-2 hidden text-center" style="font-size: 0.875rem;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
                <div class="text-center mt-3">
                    <a href="#" id="showRegister" class="text-muted" style="font-size: 0.875rem;">¿No tienes cuenta? Regístrate</a>
                </div>
            </form>

            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label class="form-label" for="regUsername">Nuevo Usuario</label>
                    <input type="text" id="regUsername" class="form-control" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" class="form-control" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regRole">Rol</label>
                    <select id="regRole" class="form-control" required>
                        <option value="admin">Administrador</option>
                        <option value="provider">Proveedor</option>
                    </select>
                </div>
                <div id="registerError" class="text-danger mb-2 hidden text-center" style="font-size: 0.875rem;"></div>
                <button type="submit" class="btn btn-success" style="width: 100%;">Crear Cuenta</button>
                <div class="text-center mt-3">
                    <a href="#" id="showLogin" class="text-muted" style="font-size: 0.875rem;">Ya tengo cuenta, iniciar sesión</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.classList.add('hidden');
            
            try {
                const res = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = 'app.html';
                } else {
                    errorDiv.textContent = data.error || 'Autenticación fallida';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.classList.remove('hidden');
            }
        });

        // Toggle Forms
        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('authSubtitle').textContent = "Crea una nueva cuenta en el sistema";
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('authSubtitle').textContent = "Inicie sesión para acceder a su panel";
        });

        // Register Logic
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const errorDiv = document.getElementById('registerError');
            
            errorDiv.classList.add('hidden');
            
            try {
                const res = await fetch('api/auth.php?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    alert('Cuenta creada con éxito. Ahora puedes iniciar sesión.');
                    document.getElementById('showLogin').click(); // switch to login form
                } else {
                    errorDiv.textContent = data.error || 'Creación fallida';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.classList.remove('hidden');
            }
        });

        // Check if already logged in
        fetch('api/auth.php?action=session')
            .then(res => res.json())
            .then(data => {
                if (data.authenticated) window.location.href = 'app.html';
            });
    </script>
</body>
</html>
